# ============================================================
# FIREBALL KNOCKBACK (FireballFight / FireballFightElo)
# ============================================================
# Ganti vanilla fireball KB yang tidak konsisten (bisa 0 atau 25)
# dengan nilai yang stabil dan bisa dikustomisasi.
#
# horizontal      : Kecepatan horizontal KB (blok/tick)
# vertical        : Kecepatan vertikal saat di tanah
# vertical-limit  : Batas maksimum kecepatan vertikal saat di udara
# min-horizontal  : Minimum horizontal agar KB tidak pernah terlalu lemah
# ============================================================
fireball-knockback:
  enabled: true
  kits:
    - fireballfight
    - fireballfightelo
  horizontal: 1.25
  vertical: 0.50
  vertical-limit: 1.05
  min-horizontal: 0.80

# ============================================================
# TNT SELF-KNOCKBACK (tanpa damage, hanya knockback)
# ============================================================
# Berlaku saat player meledakkan TNT-nya sendiri (self-hit).
# Damage dibatalkan, hanya knockback yang diterapkan.
#
# horizontal      : Kecepatan horizontal KB
# vertical        : Kecepatan vertikal saat di tanah
# vertical-limit  : Batas maksimum kecepatan vertikal saat di udara
# min-horizontal  : Minimum horizontal agar KB tidak terlalu lemah
# ============================================================
tnt-self-knockback:
  enabled: true
  kits:
    - fireballfight
    - fireballfightelo
  horizontal: 1.35
  vertical: 0.60
  vertical-limit: 1.05
  min-horizontal: 0.80