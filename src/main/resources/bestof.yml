# Best-of score limit configuration
# Controls the denominator shown in the scoreboard (e.g. 0/5)
# per kit name. Set score-limit to the total number of rounds.

stickfight:
  score-limit: 5

stickfightelo:
  score-limit: 5

mlgrush:
  score-limit: 5

mlgrushelo:
  score-limit: 5

battlerush:
  score-limit: 3

battlerushelo:
  score-limit: 3
